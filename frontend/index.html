<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Scanner - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F5F7FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            color: #1E3A5F;
            font-size: 28px;
            font-weight: 700;
        }
        .logo p {
            color: #6B7280;
            margin-top: 8px;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(30, 58, 95, 0.08);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1E3A5F;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1E3A5F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #152C4A;
        }
        .mfa-section {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #E5E7EB;
        }
        .mfa-section.active {
            display: block;
        }
        .error {
            color: #DC2626;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Compliance Scanner</h1>
            <p>Sign in to continue</p>
        </div>
        
        <div class="login-card">
            <!-- Step 1: Email/Password -->
            <div id="step1">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="admin@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <div class="error" id="loginError">Invalid credentials</div>
                <button class="login-btn" onclick="login()">Sign In</button>
            </div>
            
            <!-- Step 2: MFA -->
            <div class="mfa-section" id="step2">
                <div class="form-group">
                    <label>Enter MFA Code</label>
                    <input type="text" id="mfaCode" placeholder="000000" maxlength="6">
                </div>
                <button class="login-btn" onclick="verifyMFA()">Verify</button>
            </div>
        </div>
    </div>

    <script>
        let tempToken = null;
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.mfa_required) {
                    tempToken = data.temp_token;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').classList.add('active');
                } else if (data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/dashboard.html';
                } else {
                    document.getElementById('loginError').classList.add('show');
                }
            } catch (e) {
                document.getElementById('loginError').classList.add('show');
            }
        }
        
        async function verifyMFA() {
            const code = document.getElementById('mfaCode').value;
            
            try {
                const res = await fetch('/auth/mfa-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ temp_token: tempToken, code })
                });
                const data = await res.json();
                
                if (data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/dashboard.html';
                } else {
                    document.getElementById('loginError').textContent = 'Invalid MFA code';
                    document.getElementById('loginError').classList.add('show');
                }
            } catch (e) {
                document.getElementById('loginError').classList.add('show');
            }
        }
    </script>
</body>
</html>
